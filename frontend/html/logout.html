<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Logout | Path to Hire</title>

    <!-- Google Font -->

    <link rel="preconnect"
        href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <link rel="stylesheet"
        href="/frontend/css/logout.css">

</head>

<body>

<div class="logout-container">

    <div class="logout-card">

        <div class="icon">

            <i class="fa-solid fa-right-from-bracket"></i>

        </div>

        <h1>Logout</h1>

        <p>

            Are you sure you want to logout from
            <strong>Path to Hire?</strong>

        </p>

        <div class="user-box">

            <h3 id="userName">
                Welcome User
            </h3>

            <p id="userEmail">
                user@gmail.com
            </p>

        </div>

        <div class="buttons">

            <button
                class="cancel-btn"
                id="cancelBtn">

                <i class="fa-solid fa-arrow-left"></i>

                Cancel

            </button>

            <button
                class="logout-btn"
                id="logoutBtn">

                <i class="fa-solid fa-right-from-bracket"></i>

                Logout

            </button>

        </div>

    </div>

</div>

<script src="/frontend/js/logout.js"></script>

</body>

</html>
